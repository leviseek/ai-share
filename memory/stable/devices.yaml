# 跨设备配置

devices:
  - name: windows-desktop
    os: Windows 11
    role: 主力开发机
    shell: PowerShell 7+
    paths:
      user_bin: ~/.local/bin/
      user_bin_win: '%USERPROFILE%\.local\bin\'
      opencode_config: ~/.config/opencode/
      ai_memory: ~/ai-memory/
    notes: >-
      日常主力机。所有 AI 配置生成和大部分开发在此进行。OpenCode 通过 aiomo/aioc 命令启动，已加入用户 PATH。

  - name: wsl2
    os: Ubuntu (WSL2)
    role: Linux 开发环境
    shell: bash
    paths:
      user_bin: ~/.local/bin/
      opencode_config: ~/.config/opencode/
      ai_memory: ~/ai-memory/
    notes: >-
      用于 Linux 原生构建，以及某些工具链在 Linux 下表现更好的场景。ai-share Git 仓库从 Windows 同步或单独克隆。

  - name: macbook
    os: macOS
    role: 备用开发设备
    shell: zsh
    paths:
      user_bin: ~/.local/bin/
      opencode_config: ~/.config/opencode/
      ai_memory: ~/ai-memory/
    notes: >-
      备用或出差设备。运行相同的 ai-share 配置，环境变量按本机单独设置。

model_preferences:
  daily_coding: gpt-5 系列
  deep_reasoning: deepseek 系列
  light_tasks: gpt-5.4-mini
  compaction_model: fast
  profiles:
    - lite
    - economy
    - cheap
    - balanced
    - coding
    - research
    - writing
    - max

cross_device_rules:
  - ai-share 配置源通过 Git 同步，每个设备独立生成配置
  - 生成的 JSON 配置不提交到仓库，每个设备独立生成
  - API Key 和代理设置通过环境变量按设备单独设置，永不写入仓库
  - ai-memory 仓库克隆到各设备的 ~/ai-memory，独立管理
  - 工具安装到所有平台的 ~/.local/bin/，Windows 自动加入 PATH
