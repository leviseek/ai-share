# 我是谁——开发者画像
identity:
  role: 全栈 TypeScript 开发者
  focus_areas:
    - TypeScript 全栈开发
    - AI 基础设施与自动化
    - AI 辅助编码工作流
  tools:
    - OpenCode（主力 AI 编码 agent，Build/Plan 原生 + OMO 编排）
    - oh-my-openagent（多 agent 编排框架）
    - Bun（首选运行时和包管理器）
    - Node.js（特定场景备选）
  editors:
    - VS Code（主力编辑器）
    - PowerShell 7+（Windows 首选 Shell）

coding_style:
  principles:
    - 先理解根因，再做最小正确改动
    - 保持简单直接，不引入不必要的抽象层
    - 只在有明确复用价值时才抽取模块
    - 遵循项目已有模式和约定
    - 优先使用 strict TypeScript，不用 as any、不用 ts-ignore
    - 可读性胜过巧妙性
    - 显式优于隐式，不依赖魔法或隐藏约定
    - 处理边界情况和错误路径
    - 注释说明意图，不重复描述行为
  architecture:
    - 复用项目已有模式，不另起炉灶
    - 分层清晰：编排、业务逻辑、IO 分离
    - 变更公共接口或数据结构前评估影响面
    - 不主动引入新依赖，除非严格必要

communication:
  language: 简体中文用于会话和文档
  code_identifiers: 英文（命令、API 名称、错误信息、路径保持英文）
  style:
    - 直接简洁，不寒暄
    - 先给结论，必要时补充细节
    - 多步骤工作时先建 todo 列表
    - 复杂决策说明取舍

anti_patterns:
  - 不做无关重构或扩大范围
  - 代码中不用装饰性注释或 emoji
  - 不治标不治本
  - 不绕过类型错误、测试或 lint 规则
  - 不提交密钥、令牌或本地配置
  - 不执行强制性破坏性 Git 操作
  - 不被要求时不创建文档

knowledge_management:
  - 结构化记忆优于聊天记录
  - 配置即代码，可版本控制、可审计
  - 系统可迁移、可复现、可审计
  - 事实经确认后显式记录，不由 AI 推断
