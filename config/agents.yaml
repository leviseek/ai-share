# ============================================================
# oh-my-openagent 配置
# agents 使用插件内置代理名；categories 使用 task() 支持的类别名。
# 模型名称引用 models.yaml 顶层 key，生成脚本会自动补 provider 前缀。
# ============================================================

model_fallback: true

shared_prompt:
  append: |
    遵循当前 OpenCode instructions 中的 AI_GUIDELINES.md；涉及开发、重构或行为修改时执行其中定义的开发闭环，用户当前明确指令优先。

agents:
  sisyphus:
    model: primary
    prompt:
      append: |
        默认使用简体中文交流、解释和总结；代码标识符、命令、错误信息和 API 名称保持原文。除非用户明确要求英文，否则不要切换到英文。
        DeepSeek coding 任务必须先建立工程上下文再动手：明确目标、相关文件、现有模式、允许修改范围、禁止修改范围和验证命令。执行时只做最小正确 diff，优先复用项目约定，不输出冗长推理过程；修改后必须回灌验证结果并基于失败根因修复。

  hephaestus:
    model: primary
    prompt:
      append: |
        DeepSeek-only coding 执行约束：修改前先定位相关文件和现有实现模式，给出简短计划和风险边界；修改时保持最小 diff，不做无关重构，不放宽类型或测试；修改后运行 LSP、相关测试、typecheck/build，并把失败输出压缩为根因、关键路径和下一步。

  prometheus:
    model: reasoning

  oracle:
    model: reasoning

  momus:
    model: fast

  metis:
    model: reasoning

  atlas:
    model: primary
    prompt:
      append: |
        处理跨模块工程任务时先生成 repo map / call chain / affected files 摘要，再执行 patch。优先保留稳定上下文前缀，只注入与当前任务相关的源码和验证证据；不要把完整无关日志、生成物或锁文件长期放入上下文。

  sisyphus-junior:
    model: fast

  explorer:
    model: fast
    permission:
      edit: deny

  librarian:
    model: fast

  multimodal-looker:
    model: primary

categories:
  ultrabrain:
    model: reasoning

  deep:
    model: reasoning

  quick:
    model: fast

  unspecified-low:
    model: fast

  unspecified-high:
    model: primary
    prompt:
      append: |
        高复杂度实现任务采用 planner → executor → reviewer → validator 闭环：先拆解方案和边界条件，再修改；修改后必须审查需求符合性、类型安全、项目风格和验证结果。

  writing:
    model: primary
    prompt:
      append: |
        默认使用简体中文写作、润色和总结；代码标识符、命令、错误信息和 API 名称保持原文。除非用户明确要求英文，否则不要切换到英文。

  visual-engineering:
    model: primary

  artistry:
    model: primary

runtime_fallback:
  enabled: true
  retry_on_errors:
    - 429
    - 503
    - 529
  max_fallback_attempts: 1
  cooldown_seconds: 60
  timeout_seconds: 30
  notify_on_fallback: true
  model_whitelist:
    - primary
    - reasoning
    - fast

background_task:
  providerConcurrency:
    gpt: 3
    deepseek: 1
  modelConcurrency:
    primary: 2
    reasoning: 1
    fast: 6

dcp:
  enabled: true
  mode: shared
  handoff_policy: summarize-before-delegate
  context_budget_tokens: 24000
  share:
    plans: true
    decisions: true
    verification: true
    secrets: false
  required_sections:
    - task
    - expected_outcome
    - required_tools
    - must_do
    - must_not_do
    - context

checkpoint:
  enabled: true
  mode: agent-session
  trigger: before-edit-and-before-delegation
  max_entries: 20
  require_verification_note: true
  restore_policy: manual-only

memory:
  enabled: true
  mode: shared
  scope: project
  strategy: verified-summary
  write_policy: facts-decisions-and-runbooks-only
  read_policy: load-before-plan
  redact:
    - api_key
    - token
    - password
    - secret
    - cookie

tmux:
  enabled: true
