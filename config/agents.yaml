# ============================================================
# oh-my-openagent 配置
# agents 使用插件内置代理名；categories 使用 task() 支持的类别名。
# 模型名称引用 models.yaml 顶层 key，生成脚本会自动补 provider 前缀。
# ============================================================

model_fallback: true

agents:
  sisyphus:
    model: gpt-5.5
    prompt:
      append: |
        默认使用简体中文交流、解释和总结；代码标识符、命令、错误信息和 API 名称保持原文。除非用户明确要求英文，否则不要切换到英文。

  hephaestus:
    model: gpt-5.5

  prometheus:
    model: gpt-5.5

  oracle:
    model: gpt-5.5

  momus:
    model: gpt-5.5

  metis:
    model: gpt-5.5

  atlas:
    model: gpt-5.5

  sisyphus-junior:
    model: gpt-5.5

  explorer:
    model: gpt-5.4-mini
    permission:
      edit: deny

  librarian:
    model: gpt-5.4-mini

  multimodal-looker:
    model: gpt-5.5

categories:
  ultrabrain:
    model: gpt-5.5

  deep:
    model: gpt-5.5

  quick:
    model: gpt-5.4-mini

  unspecified-low:
    model: gpt-5.4

  unspecified-high:
    model: gpt-5.5

  writing:
    model: gpt-5.5
    prompt:
      append: |
        默认使用简体中文写作、润色和总结；代码标识符、命令、错误信息和 API 名称保持原文。除非用户明确要求英文，否则不要切换到英文。

  visual-engineering:
    model: gpt-5.5

  artistry:
    model: gpt-5.5

runtime_fallback:
  enabled: true
  retry_on_errors:
    - 429
    - 503
    - 529
  max_fallback_attempts: 1
  cooldown_seconds: 60
  timeout_seconds: 30
  notify_on_fallback: true
  model_whitelist:
    - gpt-5.5
    - gpt-5.4

background_task:
  providerConcurrency:
    codexapis: 3
    deepseek: 1
  modelConcurrency:
    gpt-5.5: 2
    gpt-5.4-mini: 6
    deepseek-v4-pro-think-max: 1

tmux:
  enabled: false
