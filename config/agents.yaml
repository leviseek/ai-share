# ============================================================
# oh-my-openagent 配置
# agents 使用插件内置代理名；categories 使用 task() 支持的类别名。
# 模型名称引用 models.yaml 顶层 key，生成脚本会自动补 provider 前缀。
# ============================================================

model_fallback: true

shared_prompt:
  append: |
    遵循当前 OpenCode instructions 中的 AI_GUIDELINES.md；涉及开发、重构或行为修改时执行其中定义的开发闭环，用户当前明确指令优先。

agents:
  sisyphus:
    model: primary
    prompt:
      append: |
        默认使用简体中文交流、解释和总结；代码标识符、命令、错误信息和 API 名称保持原文。除非用户明确要求英文，否则不要切换到英文。

  hephaestus:
    model: primary

  prometheus:
    model: reasoning

  oracle:
    model: reasoning

  momus:
    model: fast

  metis:
    model: reasoning

  atlas:
    model: primary

  sisyphus-junior:
    model: fast

  explorer:
    model: fast
    permission:
      edit: deny

  librarian:
    model: fast

  multimodal-looker:
    model: primary

categories:
  ultrabrain:
    model: reasoning

  deep:
    model: reasoning

  quick:
    model: fast

  unspecified-low:
    model: fast

  unspecified-high:
    model: primary

  writing:
    model: primary
    prompt:
      append: |
        默认使用简体中文写作、润色和总结；代码标识符、命令、错误信息和 API 名称保持原文。除非用户明确要求英文，否则不要切换到英文。

  visual-engineering:
    model: primary

  artistry:
    model: primary

runtime_fallback:
  enabled: true
  retry_on_errors:
    - 429
    - 503
    - 529
  max_fallback_attempts: 1
  cooldown_seconds: 60
  timeout_seconds: 30
  notify_on_fallback: true
  model_whitelist:
    - primary
    - reasoning
    - fast

background_task:
  providerConcurrency:
    gpt: 3
    deepseek: 1
  modelConcurrency:
    primary: 2
    reasoning: 1
    fast: 6

dcp:
  enabled: true
  mode: shared
  handoff_policy: summarize-before-delegate
  context_budget_tokens: 24000
  share:
    plans: true
    decisions: true
    verification: true
    secrets: false
  required_sections:
    - task
    - expected_outcome
    - required_tools
    - must_do
    - must_not_do
    - context

checkpoint:
  enabled: true
  mode: agent-session
  trigger: before-edit-and-before-delegation
  max_entries: 20
  require_verification_note: true
  restore_policy: manual-only

memory:
  enabled: true
  mode: shared
  scope: project
  strategy: verified-summary
  write_policy: facts-decisions-and-runbooks-only
  read_policy: load-before-plan
  redact:
    - api_key
    - token
    - password
    - secret
    - cookie

tmux:
  enabled: false
