## 提供商名
### name
### short_name   模型显示名后缀
### npm          OpenCode 使用的 provider npm 包
### base_url
### api_key
### timeout       请求超时（秒）
### chunkTimeout  流式响应块超时（秒）
providers:
  codexapis:
    name: Codex APIs
    short_name: CodexAPI
    npm: "@ai-sdk/openai-compatible"
    base_url: https://www.codexapis.com/v1
    api_key: ${CODEXAPIS_API_KEY}
    timeout: 600000
    chunkTimeout: 30000

  packyapi:
    name: Packy API
    short_name: PackyAPI
    npm: "@ai-sdk/openai"
    base_url: https://www.packyapi.com/v1
    api_key: ${PACKYAPI_API_KEY}
    timeout: 600000
    chunkTimeout: 30000

  deepseek:
    name: DeepSeek
    short_name: DeepSeek
    npm: "@ai-sdk/openai"
    base_url: https://api.deepseek.com
    api_key: ${DEEPSEEK_API_KEY}
    timeout: 600000
    chunkTimeout: 30000
