## 提供商名
### base_url
### api_key
### timeout       请求超时（秒）
### chunkTimeout  流式响应块超时（秒）
providers:
  codexapis:
    base_url: https://www.codexapis.com/v1
    api_key: ${CODEXAPIS_API_KEY}
    timeout: 600000
    chunkTimeout: 30000

  packyapi:
    base_url: https://www.packyapi.com/v1
    api_key: ${PACKYAPI_API_KEY}
    timeout: 600000
    chunkTimeout: 30000

  deepseek:
    base_url: https://api.deepseek.com
    api_key: ${DEEPSEEK_API_KEY}
    timeout: 600000
    chunkTimeout: 30000
    