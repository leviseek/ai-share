default_profile: balanced

env:
  mode: dev # dev / staging / prod
  log_level: info # debug / info / warn / error

features:
  auto_router: true
  memory: true
  fallback: true
  cost_tracking: true

runtime:
  timeout_ms: 120000
  max_retries: 2

proxy:
  enabled: true
  host: 127.0.0.1
  port: 7897
  protocol: http
  no_proxy:
    - localhost
    - 127.0.0.1
    - ::1

opencode:
  plugins:
    - oh-my-openagent@3.17.5
    - ./plugins/omo-agent-monitor
    - ./plugins/dingtalk-notifier
  aioc_excluded_plugins:
    - oh-my-openagent@3.17.5
    - ./plugins/omo-agent-monitor
  optional_plugins: [] # 例如确认包名后可加入 opencode-dcp；默认不盲装未知插件

tui:
  plugins:
    - ./plugins/omo-agent-monitor

models:
  default: gpt-5.5
  small: gpt-5.4-mini

context:
  max_tokens: 120000
  strategy: truncate # truncate / summarize / split
  cache_enabled: true # 是否启用 DCP / checkpoint / memory 等上下文缓存策略

workspace:
  ignore:
    - .git/**
    - .opencode/context-guard-alert.json
    - .opencode/context-guard-history/**
    - .opencode/handoff/**
    - .opencode/checkpoints/**
    - .opencode/dcp/**
    - .opencode/memory/**
    - .opencode-rescue/**
    - .sisyphus/evidence/**
    - node_modules/**
    - dist/**
    - build/**
    - target/**
    - .next/**
    - .nuxt/**
    - .svelte-kit/**
    - coverage/**
    - .cache/**
    - .turbo/**
    - .vite/**
    - bun.lock
    - package-lock.json
    - pnpm-lock.yaml
    - yarn.lock
    - .env
    - .env.*

compaction:
  enabled: true
  threshold: 65000

dcp:
  enabled: true
  mode: shared
  root: .opencode/dcp
  strategy: local-first
  sync: manual
  include:
    - AI_GUIDELINES.md
    - GIT_COMMIT_GUIDELINES.md
    - README.md
    - config/*.yaml
  exclude:
    - .env
    - .env.*
    - node_modules/**
    - bun.lock
    - .git/**
  secrets_policy: env-only

checkpoint:
  enabled: true
  mode: session
  root: .opencode/checkpoints
  trigger: before-risky-change
  max_entries: 20
  include:
    - config/*.yaml
    - src/**/*.ts
    - bin/*
    - plugins/**
  exclude:
    - node_modules/**
    - .git/**
    - bun.lock
  restore_policy: manual-only

memory:
  enabled: true
  mode: shared
  root: .opencode/memory
  strategy: summary-first
  retention: project
  write_policy: verified-facts-only
  redact:
    - api_key
    - token
    - password
    - secret
  include:
    - AI_GUIDELINES.md
    - README.md
    - config/*.yaml
  exclude:
    - .env
    - .env.*
    - node_modules/**
    - .git/**

context_guard:
  enabled: true
  warn_ratio: 0.5
  danger_ratio: 0.75
  block_ratio: 0.9
  absolute_block_tokens: 180000
  rescue_dir: .opencode-rescue
  diagnostics: true
  watch_interval_ms: 5000
  zero_output_limit: 3
  watch_action: stop # alert / stop，仅作用于 aiomo/aioc 启动的进程树
  alert_file: .opencode/context-guard-alert.json
  history_dir: .opencode/context-guard-history

dingtalk_notifier:
  enabled: true
  webhook_env: AI_SHARE_DINGTALK_WEBHOOK
  secret_env: AI_SHARE_DINGTALK_SECRET
  keyword_env: AI_SHARE_DINGTALK_KEYWORD
  message_type: markdown
  events:
    - session.idle
  min_interval_ms: 60000
  timeout_ms: 10000

# telemetry:
#   enabled: true
#   endpoint: http://localhost:3000/log
