default_profile: balanced

env:
  mode: dev # dev / staging / prod
  log_level: info # debug / info / warn / error

features:
  auto_router: true
  memory: true
  fallback: true
  cost_tracking: true

runtime:
  timeout_ms: 120000
  max_retries: 2

opencode:
  plugins:
    - oh-my-openagent@3.17.5
    - ./plugins/omo-agent-monitor
  optional_plugins: [] # 例如确认包名后可加入 opencode-dcp；默认不盲装未知插件

tui:
  plugins:
    - ./plugins/omo-agent-monitor

models:
  default: gpt-5.5
  small: gpt-5.4-mini

context:
  max_tokens: 120000
  strategy: truncate # truncate / summarize / split

compaction:
  enabled: true
  threshold: 65000

context_guard:
  enabled: true
  warn_ratio: 0.5
  danger_ratio: 0.75
  block_ratio: 0.9
  absolute_block_tokens: 180000
  rescue_dir: .opencode-rescue
  diagnostics: true

# telemetry:
#   enabled: true
#   endpoint: http://localhost:3000/log
