# ============================================================
# OMO 编排级别配置
# profiles 提供 primary / reasoning / fast 三个模型角色映射。
# agents.yaml 中的 agents/categories/runtime_fallback/background_task 引用这些角色。
# ============================================================

lite:
  name: 轻量编排
  models:
    primary: gpt-5.4
    reasoning: deepseek-v4-flash-think
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 50000
    model: fast
    max_input_tokens: 80000

cheap:
  name: 极低成本日常模式
  models:
    primary: gpt-5.4-mini
    reasoning: deepseek-v4-flash-think
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 45000
    model: fast
    max_input_tokens: 80000

balanced:
  name: 均衡编排
  models:
    primary: gpt-5.5
    reasoning: deepseek-v4-pro-think
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 80000
    model: fast
    max_input_tokens: 120000

coding:
  name: 代码实施优先模式
  models:
    primary: gpt-5.3-codex
    reasoning: deepseek-v4-pro-think
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 85000
    model: fast
    max_input_tokens: 120000

research:
  name: 深度研究模式
  models:
    primary: gpt-5.5
    reasoning: deepseek-v4-pro-think-max
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 110000
    model: reasoning
    max_input_tokens: 160000

writing:
  name: 写作润色模式
  models:
    primary: gpt-5.5
    reasoning: deepseek-v4-pro-think
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 90000
    model: reasoning
    max_input_tokens: 120000

max:
  name: 强力编排
  models:
    primary: gpt-5.5
    reasoning: deepseek-v4-pro-think-max
    fast: gpt-5.4
  compaction:
    enabled: true
    threshold: 130000
    model: reasoning
    max_input_tokens: 180000
