# ============================================================
# OMO 编排级别配置
# profiles 提供 primary / reasoning / fast 三个模型角色映射。
# agents.yaml 中的 agents/categories/runtime_fallback/background_task 引用这些角色。
# ============================================================

lite:
  name: 轻量编排
  models:
    primary: gpt-5.4
    reasoning: deepseek-v4-flash-think
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 40000
    model: fast
    max_input_tokens: 80000
  strategies:
    opencode:
      dcp:
        context_budget_tokens: 12000
      checkpoint:
        max_entries: 8
      memory:
        retention: session
        strategy: compact-summary
    oh_my_openagent:
      dcp:
        context_budget_tokens: 12000
      checkpoint:
        max_entries: 8
      memory:
        strategy: compact-summary

cheap:
  name: 极低成本日常模式
  models:
    primary: gpt-5.4-mini
    reasoning: deepseek-v4-flash-think
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 40000
    model: fast
    max_input_tokens: 80000
  strategies:
    opencode:
      dcp:
        context_budget_tokens: 8000
      checkpoint:
        max_entries: 6
      memory:
        retention: session
        strategy: compact-summary
    oh_my_openagent:
      dcp:
        context_budget_tokens: 8000
      checkpoint:
        max_entries: 6
      memory:
        strategy: compact-summary

balanced:
  name: 均衡编排
  models:
    primary: gpt-5.5
    reasoning: deepseek-v4-pro-think
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 65000
    model: fast
    max_input_tokens: 120000
  strategies:
    opencode:
      dcp:
        context_budget_tokens: 24000
      checkpoint:
        max_entries: 20
      memory:
        retention: project
        strategy: summary-first
    oh_my_openagent:
      dcp:
        context_budget_tokens: 24000
      checkpoint:
        max_entries: 20
      memory:
        strategy: verified-summary

coding:
  name: 代码实施优先模式
  models:
    primary: gpt-5.3-codex
    reasoning: deepseek-v4-pro-think
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 65000
    model: fast
    max_input_tokens: 120000
  strategies:
    opencode:
      dcp:
        context_budget_tokens: 26000
      checkpoint:
        trigger: before-edit-and-before-risky-change
        max_entries: 24
      memory:
        include:
          - AI_GUIDELINES.md
          - README.md
          - config/*.yaml
          - src/**/*.ts
    oh_my_openagent:
      dcp:
        context_budget_tokens: 26000
      checkpoint:
        trigger: before-edit-and-before-delegation
        max_entries: 24
      memory:
        read_policy: load-before-edit-plan

research:
  name: 深度研究模式
  models:
    primary: gpt-5.5
    reasoning: deepseek-v4-pro-think-max
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 85000
    model: reasoning
    max_input_tokens: 160000
  strategies:
    opencode:
      dcp:
        context_budget_tokens: 40000
      checkpoint:
        max_entries: 32
      memory:
        retention: project
        strategy: evidence-summary
    oh_my_openagent:
      dcp:
        context_budget_tokens: 40000
        share:
          research_notes: true
      checkpoint:
        max_entries: 32
      memory:
        strategy: evidence-summary

writing:
  name: 写作润色模式
  models:
    primary: gpt-5.5
    reasoning: deepseek-v4-pro-think
    fast: gpt-5.4-mini
  compaction:
    enabled: true
    threshold: 65000
    model: reasoning
    max_input_tokens: 120000
  strategies:
    opencode:
      dcp:
        context_budget_tokens: 22000
      checkpoint:
        max_entries: 16
      memory:
        retention: project
        strategy: prose-summary
    oh_my_openagent:
      dcp:
        context_budget_tokens: 22000
      checkpoint:
        max_entries: 16
      memory:
        strategy: prose-summary

max:
  name: 强力编排
  models:
    primary: gpt-5.5
    reasoning: deepseek-v4-pro-think-max
    fast: gpt-5.4
  compaction:
    enabled: true
    threshold: 95000
    model: reasoning
    max_input_tokens: 180000
  strategies:
    opencode:
      dcp:
        context_budget_tokens: 56000
      checkpoint:
        max_entries: 48
      memory:
        retention: project
        strategy: detailed-summary
    oh_my_openagent:
      dcp:
        context_budget_tokens: 56000
        share:
          research_notes: true
          verification_artifacts: true
      checkpoint:
        max_entries: 48
      memory:
        strategy: detailed-summary
