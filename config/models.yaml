  limits:
    context_window: 128000
    max_output: 8192
  temperature: 0.1

# ==================== deepseek 提供的原生模型 ====================
deepseek-v4-pro-think-max:
  provider: deepseek
  model_name: deepseek-v4-pro
  capabilities:
    - reasoning
    - planning
    - long_context
    - coding
  cost:
    input: 0.005
    output: 0.012
  limits:
    context_window: 256000
    max_output: 16384
  temperature: 0.1
  parameters:
    thinking:
      type: enabled
    reasoning_effort: max
  fallback:
    - deepseek-v4-pro-think
