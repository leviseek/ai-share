# ==================== codexapis 提供的 GPT 模型 ====================
gpt-5.5:
  provider: codexapis
  model_name: gpt-5.5
  capabilities:
    - reasoning
    - planning
    - long_context
  cost:
    input: 0.01
    output: 0.03
  limits:
    context_window: 200000
    max_output: 8192
  temperature: 0.2
  fallback:
    - gpt-5.4

gpt-5.4:
  provider: codexapis
  model_name: gpt-5.4
  capabilities:
    - reasoning
    - planning
    - long_context
  cost:
    input: 0.008
    output: 0.025
  limits:
    context_window: 160000
    max_output: 8192
  temperature: 0.2
  fallback:
    - gpt-5.4-mini

gpt-5.4-mini:
  provider: codexapis
  model_name: gpt-5.4-mini
  capabilities:
    - cheap
    - fast
    - general
  cost:
    input: 0.0012
    output: 0.0024
  limits:
    context_window: 128000
    max_output: 4096
  temperature: 0.2

gpt-5.3-codex:
  provider: codexapis
  model_name: gpt-5.3-codex
  capabilities:
