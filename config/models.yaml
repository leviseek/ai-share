# ==================== GPT 兼容模型组 ====================
gpt-5.5:
  provider_group: gpt
  model_name: gpt-5.5
  capabilities:
    - reasoning
    - planning
    - long_context
  cost:
    input: 0.01
    output: 0.03
  limits:
    context_window: 200000
    max_output: 8192
