<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live2D Pet</title>
    <style>
      <!-- LIVE2D_PET_STYLES -->
    </style>
  </head>
  <body data-locked="false">
    <div id="live2d-shell">
      <div id="live2d-stage">
        <div class="house-scene" aria-label="Live2D 宠物地板">
          <div class="top-drag-zone" aria-hidden="true"></div>
          <canvas id="live2d-particles" class="particle-layer" aria-hidden="true"></canvas>
          <div class="floor"></div>
          <canvas id="live2d-canvas" aria-label="Live2D pet model"></canvas>
          <div class="floor-drag-zone" aria-label="拖拽地板移动窗口"></div>
          <button id="lock-toggle" type="button" aria-label="已解锁，可拖拽" title="单击锁定拖拽">🔓</button>
        </div>
      </div>
      <div id="live2d-context-menu" hidden aria-label="Live2D 宠物菜单"></div>
      <div id="live2d-status" role="status" aria-live="polite">正在唤醒 Tororo...</div>
    </div>
    <script>
      <!-- LIVE2D_PET_SCRIPT -->
    </script>
  </body>
</html>
