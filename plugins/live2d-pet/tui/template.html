<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live2D Pet</title>
    <style>
      <!-- LIVE2D_PET_STYLES -->
    </style>
  </head>
  <body>
    <main id="pet-shell">
      <header id="toolbar">
        <div>
          <h1>Live2D Pet</h1>
          <p>优先猫模型，失败时可切换二次元角色。</p>
        </div>
        <button id="closeBtn" type="button">收起</button>
      </header>

      <section id="stage">
        <canvas id="petCanvas" width="560" height="560" aria-label="Live2D pet canvas"></canvas>
        <aside id="panel">
          <div class="section-title">模型源</div>
          <div id="modelList"></div>

          <div class="section-title">交互</div>
          <div class="button-row">
            <button id="waveBtn" type="button">打招呼</button>
            <button id="blinkBtn" type="button">眨眼</button>
            <button id="idleBtn" type="button">回到待机</button>
          </div>

          <div class="section-title">说明</div>
          <p id="status">正在准备 Live2D 资源…</p>
        </aside>
      </section>
    </main>

    <script>
      <!-- LIVE2D_PET_SCRIPT -->
    </script>
  </body>
</html>
